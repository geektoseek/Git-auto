name: Auto Commit

on:
  schedule:
    # ~35 run slots spread across 24h. Each run adds 1–2 commits until the
    # day's random target (25–35) is reached, then the remaining slots idle.
    # Plenty of slots => the target is always reachable, even if GitHub
    # skips a few scheduled runs.
    - cron: "5 0 * * *"
    - cron: "44 0 * * *"
    - cron: "23 1 * * *"
    - cron: "2 2 * * *"
    - cron: "51 2 * * *"
    - cron: "19 3 * * *"
    - cron: "8 4 * * *"
    - cron: "47 4 * * *"
    - cron: "31 5 * * *"
    - cron: "13 6 * * *"
    - cron: "58 6 * * *"
    - cron: "26 7 * * *"
    - cron: "9 8 * * *"
    - cron: "44 8 * * *"
    - cron: "33 9 * * *"
    - cron: "17 10 * * *"
    - cron: "52 10 * * *"
    - cron: "29 11 * * *"
    - cron: "6 12 * * *"
    - cron: "48 12 * * *"
    - cron: "24 13 * * *"
    - cron: "11 14 * * *"
    - cron: "55 14 * * *"
    - cron: "38 15 * * *"
    - cron: "14 16 * * *"
    - cron: "59 16 * * *"
    - cron: "27 17 * * *"
    - cron: "3 18 * * *"
    - cron: "46 18 * * *"
    - cron: "22 19 * * *"
    - cron: "9 20 * * *"
    - cron: "51 20 * * *"
    - cron: "34 21 * * *"
    - cron: "16 22 * * *"
    - cron: "58 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run
        run: python auto-commit-bot/auto_commit.py
