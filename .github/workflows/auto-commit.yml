name: Auto Commit

on:
  schedule:
    # Runs 12 times per day — every 2 hours (UTC)
    - cron: "0 0 * * *"
    - cron: "0 2 * * *"
    - cron: "0 4 * * *"
    - cron: "0 6 * * *"
    - cron: "0 8 * * *"
    - cron: "0 10 * * *"
    - cron: "0 12 * * *"
    - cron: "0 14 * * *"
    - cron: "0 16 * * *"
    - cron: "0 18 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT if you want commits to trigger other workflows,
          # otherwise the default GITHUB_TOKEN is fine.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run auto-commit script
        run: python auto_commit.py
