name: Auto Commit

on:
  schedule:
    # Runs once a day at 03:07 UTC. The script itself makes a random
    # number of commits (25–35) per run — cron only controls the timing.
    - cron: "7 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run
        run: python auto-commit-bot/auto_commit.py
